<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://8x8.vc/vpaas-magic-cookie-aa5768df638f4a4c9d8ec6468c8e1769/external_api.js" async></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#000;
        font-family:Arial, Helvetica, sans-serif;
    }

    #jaas-container{
        width:100%;
        height:100vh;
        height:100dvh; /* Better support for mobile browsers */
    }

    /* Mobile */
    @media (max-width:768px){
        html,
        body,
        #jaas-container{
            width:100%;
            height:100dvh;
        }
    }

    /* Desktop */
    @media (min-width:769px){
        #jaas-container{
            width:100%;
            height:100vh;
        }
    }
</style>

<script>

function redirectHome(){
    window.location.replace("https://www.adxpi.com/bdps/videochat.html");
}

window.onload = function(){

    function loadMeeting(){

        if(typeof JitsiMeetExternalAPI === "undefined"){
            setTimeout(loadMeeting,300);
            return;
        }

        const api = new JitsiMeetExternalAPI("8x8.vc",{

            roomName:"vpaas-magic-cookie-aa5768df638f4a4c9d8ec6468c8e1769/BDPS_VIDEO_CHAT",

            parentNode:document.querySelector("#jaas-container"),

            width:"100%",

            height:"100%",

            configOverwrite:{
                prejoinPageEnabled:false
            },

            interfaceConfigOverwrite:{
                MOBILE_APP_PROMO:false,
                SHOW_JITSI_WATERMARK:false,
                SHOW_WATERMARK_FOR_GUESTS:false
            }

            // jwt:"YOUR_JWT"
        });

        /* Redirect when meeting ends */

        api.addEventListener("readyToClose", redirectHome);

        api.addEventListener("videoConferenceLeft", redirectHome);

        api.addEventListener("dispose", redirectHome);

    }

    loadMeeting();

};

</script>

</head>

<body>

<div id="jaas-container"></div>

</body>
</html>
