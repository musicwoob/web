<script>

window.addEventListener("load", function () {

    const api = new JitsiMeetExternalAPI("8x8.vc", {

        roomName: "vpaas-magic-cookie-aa5768df638f4a4c9d8ec6468c8e1769/BDPS_VIDEO_CHAT",

        parentNode: document.querySelector("#jaas-container"),

        width: "100%",
        height: "100%",

        // Uncomment if using premium features
        // jwt: "YOUR_JWT_TOKEN",

        configOverwrite: {
            prejoinPageEnabled: true,
            enableWelcomePage: false,
            disableDeepLinking: false,
            startWithAudioMuted: false,
            startWithVideoMuted: false,
            resolution: 720,

            constraints: {
                video: {
                    height: {
                        ideal: 720,
                        max: 720,
                        min: 240
                    }
                }
            }
        },

        interfaceConfigOverwrite: {
            MOBILE_APP_PROMO: false,
            SHOW_JITSI_WATERMARK: false,
            SHOW_BRAND_WATERMARK: false,
            DEFAULT_BACKGROUND: "#000000",
            DISABLE_JOIN_LEAVE_NOTIFICATIONS: false
        }

    });

    // Responsive resize
    window.addEventListener("resize", () => {
        api.resizeLargeVideo();
    });

    // ========= AUTO REDIRECT AFTER MEETING ENDS =========

    function goHome() {
        // Change "index.html" to your homepage if needed.
        window.location.replace("index.html");
    }

    // When meeting closes
    api.addListener("readyToClose", goHome);

    // When user leaves the conference
    api.addListener("videoConferenceLeft", goHome);

    // Extra fallback if the iframe is disposed
    api.addListener("dispose", goHome);

});

</script>
