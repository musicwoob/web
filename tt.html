<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>BDPS Video Chat</title>

    <!-- Mobile PWA Support -->
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://8x8.vc/vpaas-magic-cookie-aa5768df638f4a4c9d8ec6468c8e1769/external_api.js" async></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:#000;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            align-items:center;
            justify-content:center;
        }

        #jaas-container{
            width:100%;
            height:100dvh;
            background:#000;
        }

        /* Fallback for browsers without dvh support */
        @supports not (height:100dvh){
            #jaas-container{
                height:100vh;
            }
        }

        /* Desktop */
        @media (min-width:768px){
            #jaas-container{
                width:100%;
                height:100vh;
            }
        }

        /* Mobile Safe Area */
        @supports (padding: env(safe-area-inset-top)) {
            body{
                padding-top:env(safe-area-inset-top);
                padding-bottom:env(safe-area-inset-bottom);
                padding-left:env(safe-area-inset-left);
                padding-right:env(safe-area-inset-right);
            }
        }
    </style>

</head>

<body>

<div id="jaas-container"></div>

<script>

window.addEventListener("load", function () {

    const api = new JitsiMeetExternalAPI("8x8.vc", {

        roomName: "vpaas-magic-cookie-aa5768df638f4a4c9d8ec6468c8e1769/BDPS_VIDEO_CHAT",

        parentNode: document.querySelector("#jaas-container"),

        width: "100%",
        height: "100%",

        // Uncomment if using premium features
        // jwt: "YOUR_JWT_TOKEN",

        configOverwrite: {

            prejoinPageEnabled: true,

            enableWelcomePage: false,

            disableDeepLinking: false,

            startWithAudioMuted: false,

            startWithVideoMuted: false,

            resolution: 720,

            constraints: {
                video: {
                    height: {
                        ideal: 720,
                        max: 720,
                        min: 240
                    }
                }
            }
        },

        interfaceConfigOverwrite: {

            MOBILE_APP_PROMO: false,

            SHOW_JITSI_WATERMARK: false,

            SHOW_BRAND_WATERMARK: false,

            DEFAULT_BACKGROUND: "#000000",

            DISABLE_JOIN_LEAVE_NOTIFICATIONS: false
        }

    });

    // Automatically resize on orientation change
    window.addEventListener("resize", () => {
        api.resizeLargeVideo();
    });

});

</script>

</body>
</html>
